name: Export, Deploy and E2E Test

# NOTE: After merging this workflow, change GitHub Pages source in repo settings:
#   Settings → Pages → Source → "Deploy from a branch" → branch: gh-pages / root

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.6"
  GODOT_RELEASE: "stable"

jobs:
  export:
    name: Export and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot
        run: |
          FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${FILENAME}.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/
          sudo install -m 755 "/tmp/${FILENAME}" /usr/local/bin/godot

      - name: Install export templates
        run: |
          TPZNAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TPZNAME}" \
            -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -q /tmp/templates.tpz -d /tmp/godot-templates/
          mv /tmp/godot-templates/templates/* \
            ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Import assets
        run: godot --headless --import || true

      - name: Run GUT unit tests
        run: |
          godot --headless --import || true
          godot --headless -s addons/gut/gut_cmdln.gd \
            -gdir=res://tests/unit -ginclude_subdirs -gexit

      - name: Export Web build
        run: |
          mkdir -vp build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Add Cross-Origin Isolation service worker
        run: |
          curl -fsSL -o build/web/coi-serviceworker.js \
            https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@v0.1.7/coi-serviceworker.js
          sed -i 's|</head>|<script src="coi-serviceworker.js"></script>\n</head>|' build/web/index.html

      - name: Deploy to gh-pages branch (root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
          # keep_files preserves any preview/ subdirectories written by the preview workflow
          keep_files: true
          commit_message: "Deploy main build — ${{ github.sha }}"

  playwright:
    name: Playwright E2E Tests
    needs: export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          GAME_URL: "https://haaanky.github.io/didactic-winner/"
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
