name: Branch Preview Deploy

on:
  push:
    branches:
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.4"
  GODOT_RELEASE: "stable"

jobs:
  preview:
    name: Build and Deploy Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Compute branch slug
        id: slug
        run: |
          SLUG="${GITHUB_REF_NAME//\//-}"
          echo "value=${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Install Godot
        run: |
          FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${FILENAME}.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/
          sudo install -m 755 "/tmp/${FILENAME}" /usr/local/bin/godot

      - name: Install export templates
        run: |
          TPZNAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TPZNAME}" \
            -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -q /tmp/templates.tpz -d /tmp/godot-templates/
          mv /tmp/godot-templates/templates/* \
            ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Import assets
        run: godot --headless --import || true

      - name: Export Web build
        run: |
          mkdir -vp build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Add Cross-Origin Isolation service worker
        run: |
          curl -fsSL -o build/web/coi-serviceworker.js \
            https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@v0.1.7/coi-serviceworker.js
          sed -i 's|</head>|<script src="coi-serviceworker.js"></script>\n</head>|' build/web/index.html

      - name: Deploy preview to gh-pages/preview/<slug>
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
          destination_dir: preview/${{ steps.slug.outputs.value }}
          keep_files: true
          commit_message: "Deploy preview for ${{ github.ref_name }} — ${{ github.sha }}"

      - name: Post preview URL to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SLUG: ${{ steps.slug.outputs.value }}
          SHA: ${{ github.sha }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${OWNER}/${REPO}" \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "${PR_NUMBER}" ]; then
            echo "No open PR found for this branch — skipping comment."
            exit 0
          fi

          PREVIEW_URL="https://${OWNER}.github.io/${REPO}/preview/${SLUG}/"

          MARKER="<!-- preview-bot -->"
          BODY="$(cat <<HEREDOC
${MARKER}
**Preview deployed** for commit \`${SHA:0:7}\`

Play it here: ${PREVIEW_URL}

*Updates automatically on every push. Deleted when this PR closes.*
HEREDOC
)"

          EXISTING=$(gh api \
            "repos/${OWNER}/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "${EXISTING}" ]; then
            gh api --method PATCH \
              "repos/${OWNER}/${REPO}/issues/comments/${EXISTING}" \
              -f body="${BODY}"
          else
            gh pr comment "${PR_NUMBER}" \
              --repo "${OWNER}/${REPO}" \
              --body "${BODY}"
          fi
