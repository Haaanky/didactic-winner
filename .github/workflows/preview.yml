name: Branch Preview Deploy

on:
  push:
    branches:
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6"
  GODOT_RELEASE: "stable"

jobs:
  preview:
    name: Build and Deploy Preview
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot
        run: |
          FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${FILENAME}.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/
          sudo install -m 755 "/tmp/${FILENAME}" /usr/local/bin/godot

      - name: Install export templates
        run: |
          TPZNAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TPZNAME}" \
            -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -q /tmp/templates.tpz -d /tmp/godot-templates/
          mv /tmp/godot-templates/templates/* \
            ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Import assets
        run: godot --headless --import || true

      - name: Export Web build
        run: |
          mkdir -vp build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Add Cross-Origin Isolation service worker
        run: |
          curl -fsSL -o build/web/coi-serviceworker.js \
            https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@master/coi-serviceworker.js
          sed -i 's|</head>|<script src="coi-serviceworker.js"></script>\n</head>|' build/web/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy Preview
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true

      - name: Post preview URL to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PREVIEW_URL: ${{ steps.deployment.outputs.page_url }}
          SHA: ${{ github.sha }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${OWNER}/${REPO}" \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "${PR_NUMBER}" ]; then
            echo "No open PR found for this branch — skipping comment."
            exit 0
          fi

          MARKER="<!-- preview-bot -->"
          BODY=$(printf '%s\n**Preview deployed** for commit `%s`\n\nPlay it here: %s\n\n*Updates automatically on every push. Deleted when this PR closes.*' \
            "${MARKER}" "${SHA:0:7}" "${PREVIEW_URL}")

          EXISTING=$(gh api \
            "repos/${OWNER}/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "${EXISTING}" ]; then
            gh api --method PATCH \
              "repos/${OWNER}/${REPO}/issues/comments/${EXISTING}" \
              -f body="${BODY}"
          else
            gh pr comment "${PR_NUMBER}" \
              --repo "${OWNER}/${REPO}" \
              --body "${BODY}"
          fi
