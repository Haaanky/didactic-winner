name: Branch Preview Build

on:
  push:
    branches:
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: gh-pages-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.1"
  GODOT_RELEASE: "stable"

jobs:
  preview:
    name: Build and Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot
        run: |
          FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${FILENAME}.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/
          sudo install -m 755 "/tmp/${FILENAME}" /usr/local/bin/godot

      - name: Install export templates
        run: |
          TPZNAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TPZNAME}" \
            -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -q /tmp/templates.tpz -d /tmp/godot-templates/
          mv /tmp/godot-templates/templates/* \
            ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Import assets
        run: godot --headless --import || true

      - name: Export Web build
        run: |
          mkdir -vp build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Add Cross-Origin Isolation service worker
        run: |
          curl -fsSL -o build/web/coi-serviceworker.js \
            https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@master/coi-serviceworker.js
          sed -i 's|</head>|<script src="coi-serviceworker.js"></script>\n</head>|' build/web/index.html

      - name: Verify build artifacts
        run: |
          echo "Build contents:"
          ls -lh build/web/
          echo "WASM size: $(du -sh build/web/index.wasm 2>/dev/null || echo 'missing')"
          echo "PCK size:  $(du -sh build/web/index.pck  2>/dev/null || echo 'missing')"
          test -f build/web/index.html
          test -f build/web/index.wasm
          test -f build/web/index.pck

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: build/web/
          retention-days: 7

      - name: Post build status to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${OWNER}/${REPO}" \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "${PR_NUMBER}" ]; then
            echo "No open PR found for this branch — skipping comment."
            exit 0
          fi

          MARKER="<!-- preview-bot -->"
          WASM_MB=$(du -m build/web/index.wasm | cut -f1)
          PCK_MB=$(du -m build/web/index.pck | cut -f1)
          BODY=$(printf '%s\n**Web build verified** for commit `%s`\n\n| File | Size |\n|------|------|\n| index.wasm | %s MB |\n| index.pck | %s MB |\n\nThe live site at https://%s.github.io/%s/ will update after this PR is merged.' \
            "${MARKER}" "${SHA:0:7}" "${WASM_MB}" "${PCK_MB}" "${OWNER}" "${REPO}")

          EXISTING=$(gh api \
            "repos/${OWNER}/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "${EXISTING}" ]; then
            gh api --method PATCH \
              "repos/${OWNER}/${REPO}/issues/comments/${EXISTING}" \
              -f body="${BODY}"
          else
            gh pr comment "${PR_NUMBER}" \
              --repo "${OWNER}/${REPO}" \
              --body "${BODY}"
          fi
